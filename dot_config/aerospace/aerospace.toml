after-login-command = []

after-startup-command = []

start-at-login = false

enable-normalization-flatten-containers = true

enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

key-mapping.preset = 'qwerty'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# on-focus-changed = 'move-mouse window-lazy-center'

[gaps]

inner.horizontal = 10

inner.vertical = 10

outer.left = 10

outer.bottom = 10

outer.top = 10

outer.right = 10

[mode.main.binding]

cmd-alt-ctrl-shift-n = 'layout tiles horizontal vertical'

cmd-alt-ctrl-shift-m = 'layout accordion horizontal vertical'

cmd-alt-ctrl-shift-v = 'layout floating tiling'

cmd-alt-ctrl-shift-g = 'workspace-back-and-forth'

cmd-alt-ctrl-shift-b = 'mode service'

cmd-alt-ctrl-shift-z = 'resize smart -50'

cmd-alt-ctrl-shift-x = 'resize smart +50'

cmd-alt-ctrl-shift-c = 'reload-config'

cmd-alt-ctrl-shift-h = 'focus left'

cmd-alt-ctrl-shift-j = 'focus down'

cmd-alt-ctrl-shift-k = 'focus up'

cmd-alt-ctrl-shift-l = 'focus right'

cmd-alt-ctrl-shift-a = 'move left'

cmd-alt-ctrl-shift-s = 'move down'

cmd-alt-ctrl-shift-d = 'move up'

cmd-alt-ctrl-shift-f = 'move right'

cmd-alt-ctrl-shift-y = 'workspace 1'

cmd-alt-ctrl-shift-u = 'workspace 2'

cmd-alt-ctrl-shift-i = 'workspace 3'

cmd-alt-ctrl-shift-q = 'move-node-to-workspace 1'

cmd-alt-ctrl-shift-w = 'move-node-to-workspace 2'

cmd-alt-ctrl-shift-e = 'move-node-to-workspace 3'

# cmd-alt-ctrl-shift-space = 'move-workspace-to-monitor --wrap-around next'

[mode.service.binding]

c = ['reload-config', 'mode main']

# reset layout
r = ['flatten-workspace-tree', 'mode main']

v = ['layout floating tiling', 'mode main']

q = ['close-all-windows-but-current', 'mode main']

h = ['join-with left', 'mode main']

j = ['join-with down', 'mode main']

k = ['join-with up', 'mode main']

l = ['join-with right', 'mode main']


[[on-window-detected]]

run = 'layout floating'

[workspace-to-monitor-force-assignment]

1 = "secondary"

2 = "main"

3 = "main"
