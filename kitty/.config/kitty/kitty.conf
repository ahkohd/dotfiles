include themes/cyberdream.conf

shell zsh

# Font
font_family TX-02-AREMU
font_size 13.0
adjust_line_height 135%
bold_font auto
italic_font auto
bold_italic_font auto
disable_ligatures always

# Window
background_opacity 0.9
background_blur 20
dynamic_background_opacity yes
macos_window_shadow yes
macos_titlebar_color background
confirm_os_window_close 0
macos_option_as_alt yes

# Scrollback
scrollback_lines 2000
wheel_scroll_min_lines 1

# Behaviour
enable_audio_bell no
text_composition_strategy legacy
mouse_hide_wait 1.0

# Copy/paste
copy_on_select clipboard
strip_trailing_spaces smart

# URLs
undercurl_style thin-dense
url_style curly
show_hyperlink_targets yes

# Selection
selection_foreground none
selection_background none

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Keyboard
clear_all_shortcuts yes
map ctrl+shift+u discard_event
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+q quit
map cmd+w close_window
map cmd+n new_os_window
map cmd+plus change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0
map alt+f send_text all \x1bf
map shift+enter send_text all \x1b[13;2u
map ctrl+enter send_text all \x1b[13;5u

# Image support (kitty graphics protocol)
# Works out of the box — no config needed
