# ── General ──────────────────────────────────────────────
set  -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-kitty:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underline colors
set  -s escape-time       10
set  -s extended-keys        always
set  -g extended-keys-format csi-u
set  -g allow-passthrough  on
set -as terminal-features ',xterm-kitty:extkeys'
bind -n S-Enter send-keys -H 1b 5b 31 33 3b 32 75
bind -n BTab send-keys -H 1b 5b 5a
# Force raw bytes for Ctrl keys (extended-keys always encodes as CSI u)
bind -n C-a send-keys -H 01
bind -n C-b send-keys -H 02
bind -n C-c send-keys -H 03
bind -n C-d send-keys -H 04
bind -n C-e send-keys -H 05
bind -n C-g send-keys -H 07
bind -n C-k send-keys -H 0b
bind -n C-l send-keys -H 0c
bind -n C-n send-keys -H 0e
bind -n C-o send-keys -H 0f
bind -n C-p send-keys -H 10
bind -n C-r send-keys -H 12
bind -n C-t send-keys -H 14
bind -n C-u send-keys -H 15
bind -n C-w send-keys -H 17
bind -n C-y send-keys -H 19
bind -n C-z send-keys -H 1a

set  -g history-limit     10000
set  -g base-index        1
setw -g pane-base-index   1
set  -g renumber-windows  on
set  -g mouse             on
set  -g focus-events      on
setw -g aggressive-resize on
setw -g clock-mode-style  12
set  -g status-keys       vi
set  -g mode-keys         vi

# ── Prefix ──────────────────────────────────────────────
unbind C-b
set -g prefix M-f
bind M-f send-prefix

# ── Reload ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Splits ──────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind n new-window -c "#{pane_current_path}"
bind N command-prompt -p "new session:" "new-session -s '%%'"
unbind '"'
unbind %

# ── Pane navigation ─────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane resize ─────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi) ─────────────────────────────────────
bind-key -T copy-mode-vi 'v' send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

# ── Scroll ──────────────────────────────────────────────
bind a copy-mode
bind v copy-mode \; send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind V copy-mode \; send-keys -X begin-selection \; send-keys -X select-line

# ── Session / window switching ──────────────────────────
bind t choose-tree -sZ
bind i previous-window
bind o next-window
bind -n M-i previous-window
bind -n M-o next-window
bind w choose-tree -wZ
bind Tab last-window
bind Space switch-client -l

# ── Kill ────────────────────────────────────────────────
bind x confirm-before -p "kill pane? (y/n)" kill-pane
bind X confirm-before -p "kill window? (y/n)" kill-window
bind Q confirm-before -p "kill session? (y/n)" kill-session

# ── Pane borders ────────────────────────────────────────
set -g pane-border-style fg=#3c4048
set -g pane-active-border-style fg=#3c4048
set -g pane-border-lines single
set -g pane-border-indicators off

# ── Status bar ──────────────────────────────────────────
set -g status-position top
set -g status-style fg=#D0D0D0,bg=default
set -g status-left " #[fg=#7b8496]#{session_name}/#[fg=#ffffff]#{window_name}"
set -g status-left-length 80
set -g status-right ""
set -g status-right-length 0
set -g window-status-format ""
set -g window-status-current-format ""

# ── Fuzzy finder ────────────────────────────────────────
bind f display-popup -E -w 80% -h 50% "~/.config/tmux/scripts/tmux-jump.sh"
bind / display-popup -E -w 80% -h 50% "~/.config/tmux/scripts/tmux-jump.sh"

# ── Plugins ─────────────────────────────────────────────
TMUX_FZF_LAUNCH_KEY="F"
run-shell ~/.config/tmux/plugins/tmux-fzf/main.tmux
run-shell ~/.config/tmux/plugins/tmux-command-palette/init.tmux
