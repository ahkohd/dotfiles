
[env]
TERM = "alacritty"

[font]
size = 16


[font.normal]
family = "Berkeley Mono"
style = "Regular"

[font.italic]
family = "Berkeley Mono"
style = "Italic"

[font.bold]
family = "Berkeley Mono"
style = "Bold"

[font.bold_italic]
family = "Berkeley Mono"
style = "Bold Italic"

[terminal.shell]
program = "zsh"

[window]
opacity = 1.0
blur = true
decorations = "Buttonless"
option_as_alt = "Both"

[window.dimensions]
columns = 140
lines = 38

[window.padding]
x = 10
y = 5

[general]
import = ["~/.config/alacritty/themes/tokyonight_storm.toml"]

[terminal]
